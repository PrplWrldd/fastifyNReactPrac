# docker-compose.yml
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=local-dev-secret
      - FRONTEND_URL=http://localhost:5173
      - PORT=3000
      - DB_PATH=/app/data/taskflow.sqlite
    volumes:
      - taskflow-db:/app/data   # persists SQLite across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    ports:
      - "5173:80"     # Nginx inside container runs on 80, mapped to 5173
    depends_on:
      backend:
        condition: service_healthy  # waits for backend to be ready

volumes:
  taskflow-db: